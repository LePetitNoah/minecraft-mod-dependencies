<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Explorateur de Dépendances Minecraft</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
        background: linear-gradient(180deg, #1a1a1a 0%, #2d2d2d 100%);
        min-height: 100vh;
        padding: 20px;
        color: #e0e0e0;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      header {
        text-align: center;
        margin-bottom: 40px;
        padding: 30px 20px;
        background: linear-gradient(180deg, #2a2a2a 0%, #1f1f1f 100%);
        border: 2px solid #ff6b35;
        box-shadow: 0 4px 20px rgba(255, 107, 53, 0.2);
      }

      header h1 {
        font-size: 2.8em;
        margin-bottom: 10px;
        color: #ff6b35;
        text-shadow: 0 2px 10px rgba(255, 107, 53, 0.5);
        font-weight: 700;
        letter-spacing: 2px;
      }

      header p {
        font-size: 1.1em;
        color: #b0b0b0;
        font-weight: 300;
      }

      .card {
        background: linear-gradient(180deg, #2a2a2a 0%, #252525 100%);
        border: 2px solid #404040;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        padding: 30px;
        margin-bottom: 30px;
        transition: all 0.3s ease;
      }

      .card:hover {
        border-color: #ff6b35;
        box-shadow: 0 8px 32px rgba(255, 107, 53, 0.1);
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        font-weight: 600;
        color: #ff6b35;
        text-transform: uppercase;
        font-size: 0.9em;
        letter-spacing: 1px;
      }

      input,
      select {
        width: 100%;
        padding: 12px 15px;
        border: 2px solid #404040;
        background: #1f1f1f;
        color: #e0e0e0;
        font-size: 1em;
        transition: all 0.3s;
        font-family: inherit;
      }

      input::placeholder {
        color: #606060;
      }

      input:focus,
      select:focus {
        outline: none;
        border-color: #ff6b35;
        background: #252525;
        box-shadow: 0 0 0 3px rgba(255, 107, 53, 0.1);
      }

      .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        gap: 20px;
      }

      @media (max-width: 768px) {
        .form-row {
          grid-template-columns: 1fr;
        }
      }

      button {
        background: linear-gradient(180deg, #ff6b35 0%, #e55a2b 100%);
        color: white;
        padding: 14px 30px;
        border: 2px solid transparent;
        font-size: 1.05em;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s;
        width: 100%;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 107, 53, 0.5);
        border-color: #ffa366;
      }

      button:active {
        transform: translateY(0);
      }

      button:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .loading {
        display: none;
        text-align: center;
        padding: 40px 20px;
      }

      .spinner {
        border: 4px solid #404040;
        border-top: 4px solid #ff6b35;
        border-radius: 2px;
        width: 50px;
        height: 50px;
        animation: spin 1s linear infinite;
        margin: 0 auto 15px;
      }

      @keyframes spin {
        0% {
          transform: rotate(0deg);
        }
        100% {
          transform: rotate(360deg);
        }
      }

      .error {
        background: rgba(220, 53, 69, 0.1);
        border-left: 4px solid #dc3545;
        border-top: 2px solid #404040;
        border-right: 2px solid #404040;
        border-bottom: 2px solid #404040;
        padding: 15px;
        margin-bottom: 20px;
        display: none;
        color: #ff6b6b;
      }

      .success {
        background: rgba(40, 167, 69, 0.1);
        border-left: 4px solid #28a745;
        border-top: 2px solid #404040;
        border-right: 2px solid #404040;
        border-bottom: 2px solid #404040;
        padding: 15px;
        margin-bottom: 20px;
        display: none;
        color: #6dd5a8;
      }

      .mod-info {
        background: rgba(255, 107, 53, 0.05);
        padding: 20px;
        border: 2px solid #ff6b35;
        margin-bottom: 20px;
      }

      .mod-name {
        font-size: 2em;
        font-weight: 700;
        color: #ff6b35;
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .mod-summary {
        color: #b0b0b0;
        font-size: 1em;
        line-height: 1.6;
      }

      .mod-info small {
        display: block;
        color: #808080;
        margin-top: 12px;
        font-size: 0.85em;
      }

      .dependencies-container {
        display: none;
      }

      .files-list {
        margin-top: 20px;
      }

      .file-item {
        background: linear-gradient(180deg, #252525 0%, #1f1f1f 100%);
        border: 2px solid #404040;
        padding: 18px;
        margin-bottom: 15px;
        cursor: pointer;
        transition: all 0.3s;
      }

      .file-item:hover {
        background: linear-gradient(180deg, #2d2d2d 0%, #252525 100%);
        border-color: #ff6b35;
        box-shadow: 0 4px 15px rgba(255, 107, 53, 0.2);
      }

      .file-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 12px;
      }

      .file-name {
        font-weight: 700;
        color: #e0e0e0;
        font-size: 1.1em;
      }

      .release-type {
        display: inline-block;
        padding: 6px 12px;
        border: 2px solid;
        font-size: 0.8em;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .release-type.Release {
        background: rgba(46, 194, 111, 0.15);
        border-color: #2ec26f;
        color: #2ec26f;
      }

      .release-type.Beta {
        background: rgba(255, 193, 7, 0.15);
        border-color: #ffc107;
        color: #ffc107;
      }

      .release-type.Alpha {
        background: rgba(255, 107, 53, 0.15);
        border-color: #ff6b35;
        color: #ff6b35;
      }

      .file-item > small {
        display: block;
        color: #808080;
        font-size: 0.85em;
      }

      .dependencies-list {
        margin-top: 15px;
        padding: 0;
      }

      .dependency-item {
        display: flex;
        align-items: center;
        padding: 10px;
        background: rgba(255, 107, 53, 0.05);
        margin-bottom: 8px;
        border-left: 3px solid #ff6b35;
      }

      .dependency-icon {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 32px;
        height: 32px;
        margin-right: 12px;
        font-size: 0.9em;
        font-weight: bold;
        flex-shrink: 0;
        border: 2px solid;
      }

      .dependency-required {
        border-color: #dc3545;
        background: rgba(220, 53, 69, 0.2);
        color: #ff6b6b;
      }

      .dependency-optional {
        border-color: #ffc107;
        background: rgba(255, 193, 7, 0.2);
        color: #ffc107;
      }

      .dependency-embedded {
        border-color: #9c27b0;
        background: rgba(156, 39, 176, 0.2);
        color: #ce93d8;
      }

      .dependency-tool {
        border-color: #00bcd4;
        background: rgba(0, 188, 212, 0.2);
        color: #4dd0e1;
      }

      .dependency-incompatible {
        border-color: #607d8b;
        background: rgba(96, 125, 139, 0.2);
        color: #90a4ae;
      }

      .dependency-include {
        border-color: #e91e63;
        background: rgba(233, 30, 99, 0.2);
        color: #f06292;
      }

      .dependency-info {
        flex: 1;
      }

      .dependency-name {
        font-weight: 700;
        color: #e0e0e0;
        margin-bottom: 3px;
      }

      .dependency-type {
        font-size: 0.8em;
        color: #a0a0a0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
      }

      .stat {
        background: linear-gradient(135deg, #ff6b35 0%, #e55a2b 100%);
        color: white;
        padding: 20px;
        border: 2px solid #ff6b35;
        text-align: center;
        box-shadow: 0 4px 15px rgba(255, 107, 53, 0.3);
        transition: all 0.3s;
      }

      .stat:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 107, 53, 0.4);
      }

      .stat-value {
        font-size: 2.5em;
        font-weight: 700;
        margin-bottom: 8px;
      }

      .stat-label {
        font-size: 0.9em;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-weight: 600;
      }

      .toggle-dependencies {
        background: transparent;
        border: 2px solid #ff6b35;
        color: #ff6b35;
        padding: 10px 15px;
        cursor: pointer;
        font-weight: 600;
        margin-top: 10px;
        width: auto;
        transition: all 0.3s;
      }

      .toggle-dependencies:hover {
        background: rgba(255, 107, 53, 0.1);
      }

      .no-results {
        text-align: center;
        padding: 60px 20px;
        color: #606060;
      }

      .no-results-icon {
        font-size: 3.5em;
        margin-bottom: 15px;
      }

      .no-results p {
        font-size: 1.2em;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Explorateur de Dépendances Minecraft</h1>
        <p>
          Découvrez toutes les dépendances d'un mod pour votre version et
          modloader préférés
        </p>
      </header>

      <div class="card">
        <form id="dependenciesForm">
          <div class="form-row">
            <div class="form-group">
              <label for="modSlug">Slug du Mod *</label>
              <input
                type="text"
                id="modSlug"
                name="mod_slug"
                placeholder="Ex: malum, applied-energistics-2"
                required
              />
            </div>
            <div class="form-group">
              <label for="gameVersion">Version Minecraft</label>
              <input
                type="text"
                id="gameVersion"
                name="game_version"
                placeholder="Ex: 1.21.1"
                value="1.21.1"
              />
            </div>
            <div class="form-group">
              <label for="modLoader">Modloader *</label>
              <select id="modLoader" name="mod_loader" required>
                <option value="6">NeoForge</option>
                <option value="1">Forge</option>
                <option value="4">Fabric</option>
                <option value="0">Any</option>
              </select>
            </div>
          </div>
          <button type="submit">🔎 Chercher les Dépendances</button>
        </form>

        <div class="loading" id="loading">
          <div class="spinner"></div>
          <p>Recherche en cours...</p>
        </div>

        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
      </div>

      <div class="dependencies-container" id="dependenciesContainer">
        <div class="card">
          <div class="mod-info" id="modInfo"></div>

          <div class="stats" id="stats"></div>

          <div class="files-list" id="filesList"></div>

          <div class="no-results" id="noResults">
            <div class="no-results-icon">📭</div>
            <p>Aucune dépendance trouvée</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("dependenciesForm");
      const loading = document.getElementById("loading");
      const error = document.getElementById("error");
      const success = document.getElementById("success");
      const dependenciesContainer = document.getElementById(
        "dependenciesContainer",
      );
      const modInfo = document.getElementById("modInfo");
      const filesList = document.getElementById("filesList");
      const stats = document.getElementById("stats");
      const noResults = document.getElementById("noResults");

      const relationTypeIcons = {
        RequiredDependency: "⚠️",
        OptionalDependency: "❓",
        EmbeddedLibrary: "📦",
        Tool: "🔧",
        Incompatible: "❌",
        Include: "📌",
      };

      const relationTypeColors = {
        RequiredDependency: "dependency-required",
        OptionalDependency: "dependency-optional",
        EmbeddedLibrary: "dependency-embedded",
        Tool: "dependency-tool",
        Incompatible: "dependency-incompatible",
        Include: "dependency-include",
      };

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const modSlug = document.getElementById("modSlug").value.trim();
        const gameVersion = document.getElementById("gameVersion").value.trim();
        const modLoader = document.getElementById("modLoader").value;

        if (!modSlug) {
          showError("Veuillez remplir le slug");
          return;
        }

        await searchDependencies(modSlug, gameVersion, modLoader);
      });

      async function searchDependencies(modSlug, gameVersion, modLoader) {
        loading.style.display = "block";
        error.style.display = "none";
        success.style.display = "none";
        dependenciesContainer.style.display = "none";

        try {
          const response = await fetch("/api/dependencies", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              mod_slug: modSlug,
              game_version: gameVersion,
              mod_loader: modLoader,
            }),
          });

          const data = await response.json();

          if (!response.ok) {
            throw new Error(data.error || "Erreur lors de la recherche");
          }

          if (data.success) {
            displayDependencies(data.data);
            showSuccess(`Mod "${data.data.name}" trouvé !`);
          } else {
            throw new Error(data.error || "Erreur inconnue");
          }
        } catch (err) {
          showError(err.message);
        } finally {
          loading.style.display = "none";
        }
      }

      function displayDependencies(modData) {
        // Afficher les infos du mod
        modInfo.innerHTML = `
                <div class="mod-name">${modData.name}</div>
                <div class="mod-summary">${modData.summary || "Pas de description disponible"}</div>
                <small style="color: #999; margin-top: 10px; display: block;">ID: ${modData.id} | Slug: ${modData.slug}</small>
            `;

        // Calculer les statistiques
        let totalDeps = 0;
        let requiredCount = 0;
        let optionalCount = 0;
        const filesArray = modData.files || [];

        filesArray.forEach((file) => {
          const deps = file.dependencies || [];
          totalDeps += deps.length;
          requiredCount += deps.filter(
            (d) => d.relationTypeName === "RequiredDependency",
          ).length;
          optionalCount += deps.filter(
            (d) => d.relationTypeName === "OptionalDependency",
          ).length;
        });

        // Afficher les stats
        stats.innerHTML = `
                <div class="stat">
                    <div class="stat-value">${filesArray.length}</div>
                    <div class="stat-label">Fichier(s) compatible(s)</div>
                </div>
                <div class="stat">
                    <div class="stat-value">${totalDeps}</div>
                    <div class="stat-label">Dépendance(s) totale(s)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #f44336;">${requiredCount}</div>
                    <div class="stat-label">Requise(s)</div>
                </div>
                <div class="stat">
                    <div class="stat-value" style="color: #ff9800;">${optionalCount}</div>
                    <div class="stat-label">Optionnelle(s)</div>
                </div>
            `;

        // Afficher les fichiers et dépendances
        filesList.innerHTML = "";

        if (filesArray.length === 0) {
          noResults.style.display = "block";
        } else {
          noResults.style.display = "none";

          filesArray.forEach((file, index) => {
            const fileDiv = document.createElement("div");
            fileDiv.className = "file-item";

            const dependencies = file.dependencies || [];
            const dependenciesHTML =
              dependencies.length === 0
                ? '<p style="color: #999; margin: 10px 0;">Aucune dépendance</p>'
                : `
                            <div class="dependencies-list">
                                ${dependencies
                                  .map(
                                    (dep) => `
                                    <div class="dependency-item">
                                        <div class="dependency-icon ${relationTypeColors[dep.relationTypeName] || ""}">
                                            ${relationTypeIcons[dep.relationTypeName] || "📁"}
                                        </div>
                                        <div class="dependency-info">
                                            <div class="dependency-name">${dep.name}</div>
                                            <div class="dependency-type">${dep.relationTypeName}</div>
                                        </div>
                                    </div>
                                `,
                                  )
                                  .join("")}
                            </div>
                        `;

            fileDiv.innerHTML = `
                        <div class="file-header">
                            <span class="file-name">${file.displayName || file.fileName}</span>
                            <span class="release-type ${file.releaseType}">${file.releaseType || "Unknown"}</span>
                        </div>
                        <small style="color: #999;">${file.fileName}</small>
                        ${dependenciesHTML}
                    `;

            filesList.appendChild(fileDiv);
          });
        }

        dependenciesContainer.style.display = "block";
      }

      function showError(message) {
        error.textContent = "❌ " + message;
        error.style.display = "block";
      }

      function showSuccess(message) {
        success.textContent = "✅ " + message;
        success.style.display = "block";
        setTimeout(() => {
          success.style.display = "none";
        }, 5000);
      }
    </script>
  </body>
</html>
